<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design 7: Holographic HUD</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #020b14;
            --hud-color: #00e5ff;
            --hud-dim: rgba(0, 229, 255, 0.3);
            --border-width: 1px;
        }

        body {
            background-color: var(--bg-color);
            background-image:
                radial-gradient(circle, rgba(0, 229, 255, 0.1) 1px, transparent 1px);
            background-size: 30px 30px;
            color: var(--hud-color);
            font-family: 'Share Tech Mono', monospace;
            padding: 2rem;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .hud-card {
            background: rgba(2, 11, 20, 0.6);
            border: 1px solid var(--hud-color);
            padding: 1.5rem;
            position: relative;
            box-shadow: 0 0 10px var(--hud-dim);
            transition: all 0.3s;
        }

        /* Technical Corners */
        .hud-card::after {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            width: 10px;
            height: 10px;
            border-top: 2px solid var(--hud-color);
            border-left: 2px solid var(--hud-color);
        }

        .hud-card::before {
            content: '';
            position: absolute;
            bottom: -2px;
            right: -2px;
            width: 10px;
            height: 10px;
            border-bottom: 2px solid var(--hud-color);
            border-right: 2px solid var(--hud-color);
        }

        h1 {
            text-transform: uppercase;
            letter-spacing: 5px;
            border-bottom: 2px solid var(--hud-color);
            padding-bottom: 1rem;
            display: inline-block;
        }

        .btn {
            background: transparent;
            border: 1px solid var(--hud-color);
            color: var(--hud-color);
            padding: 0.5rem 1.5rem;
            font-family: 'Share Tech Mono', monospace;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn:hover {
            background: var(--hud-color);
            color: #000;
            box-shadow: 0 0 20px var(--hud-color);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .data-stream {
            font-size: 0.8rem;
            color: var(--hud-dim);
            margin-bottom: 1rem;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>SYSTEM: QUANTUM_STUDY_HUB</h1>
        <div class="data-stream">CONNECTING... ENCRYPTED... SECURE.</div>

        <div class="grid">
            <div class="hud-card">
                <h3>TARGET: WEEK 4</h3>
                <div style="display: flex; justify-content: space-between; align-items: flex-end; margin: 2rem 0;">
                    <div style="font-size: 3rem;">56%</div>
                    <div style="font-size: 0.8rem;">COMPLETION_RATE</div>
                </div>
                <button class="btn" style="width: 100%;">INITIATE</button>
            </div>
            <div class="hud-card">
                <h3>SIMULATION_STATUS</h3>
                <div
                    style="margin: 1rem 0; height: 100px; border-left: 1px solid var(--hud-color); border-bottom: 1px solid var(--hud-color); position: relative;">
                    <!-- Fake Graph -->
                    <div
                        style="position: absolute; bottom: 0; left: 10%; width: 10px; height: 30%; background: var(--hud-color);">
                    </div>
                    <div
                        style="position: absolute; bottom: 0; left: 30%; width: 10px; height: 50%; background: var(--hud-color);">
                    </div>
                    <div
                        style="position: absolute; bottom: 0; left: 50%; width: 10px; height: 80%; background: var(--hud-color);">
                    </div>
                    <div
                        style="position: absolute; bottom: 0; left: 70%; width: 10px; height: 40%; background: var(--hud-color);">
                    </div>
                </div>
                <p>> Optimal parameters detected.</p>
            </div>
            <div class="hud-card">
                <h3>NOTIFICATIONS [3]</h3>
                <ul style="list-style: none; padding: 0;">
                    <li style="margin-bottom: 0.5rem;">[!] Quiz deadline approaching</li>
                    <li style="margin-bottom: 0.5rem;">[i] New lecture available</li>
                    <li style="margin-bottom: 0.5rem;">[✓] Server sync complete</li>
                </ul>
            </div>
        </div>
    </div>
</body>

</html>
