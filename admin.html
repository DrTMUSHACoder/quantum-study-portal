<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quantum Computing Study Portal — Admin Panel</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(regs => {
        for (let r of regs) r.unregister();
      });
    }
  </script>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;600;700;900&display=swap"
    rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0a0e1a;
      --surface: #111827;
      --surface-2: #1f2937;
      --border: rgba(255, 255, 255, 0.08);
      --primary: #38bdf8;
      --primary-glow: rgba(56, 189, 248, 0.15);
      --accent: #a78bfa;
      --success: #22c55e;
      --warning: #f59e0b;
      --error: #ef4444;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --font: 'Inter', sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* Top Nav */
    .admin-nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(20px);
    }

    .admin-nav h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 1.4rem;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .admin-nav .badge {
      background: var(--primary-glow);
      color: var(--primary);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      border: 1px solid rgba(56, 189, 248, 0.3);
    }

    /* Login */
    .login-container {
      max-width: 420px;
      margin: 100px auto;
      padding: 2rem;
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem;
      text-align: center;
    }

    .login-card h2 {
      font-family: 'Outfit';
      margin-bottom: 0.5rem;
      font-size: 1.8rem;
    }

    .login-card p {
      color: var(--text-muted);
      margin-bottom: 2rem;
      font-size: 0.9rem;
    }

    .login-card input {
      width: 100%;
      padding: 12px 16px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 0.95rem;
      margin-bottom: 1rem;
      outline: none;
      transition: border-color 0.3s;
    }

    .login-card input:focus {
      border-color: var(--primary);
    }

    .login-card button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, var(--primary), #0ea5e9);
      color: #000;
      border: none;
      border-radius: 10px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.3s;
    }

    .login-card button:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 25px rgba(56, 189, 248, 0.3);
    }

    /* Main Layout */
    .admin-container {
      padding: 2rem;
      max-width: 1400px;
      margin: 0 auto;
    }

    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1.25rem;
      margin-bottom: 2rem;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.5rem;
      text-align: center;
      transition: transform 0.3s, border-color 0.3s;
    }

    .stat-card:hover {
      transform: translateY(-3px);
      border-color: var(--primary);
    }

    .stat-card .stat-value {
      font-size: 2.5rem;
      font-weight: 900;
      font-family: 'Outfit';
      margin-bottom: 4px;
    }

    .stat-card .stat-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      font-weight: 600;
      color: var(--text-muted);
    }

    /* Toolbar */
    .toolbar {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .toolbar input,
    .toolbar select {
      padding: 10px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 0.9rem;
      outline: none;
    }

    .toolbar input {
      flex: 1;
      min-width: 250px;
    }

    .toolbar input:focus {
      border-color: var(--primary);
    }

    .toolbar button {
      padding: 10px 20px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 0.85rem;
    }

    .toolbar button:hover {
      background: var(--primary-glow);
      border-color: var(--primary);
      color: var(--primary);
    }

    .toolbar .btn-export {
      background: linear-gradient(135deg, var(--success), #16a34a);
      color: #000;
      border: none;
      font-weight: 700;
    }

    /* Table */
    .table-container {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow-x: auto;
      margin-bottom: 2rem;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead {
      background: var(--surface-2);
    }

    th {
      padding: 14px 16px;
      text-align: left;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      font-weight: 700;
      border-bottom: 1px solid var(--border);
    }

    td {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 0.88rem;
      color: var(--text);
    }

    tbody tr {
      transition: background 0.2s;
      cursor: pointer;
    }

    tbody tr:hover {
      background: rgba(56, 189, 248, 0.05);
    }

    .role-badge {
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 0.72rem;
      font-weight: 600;
    }

    .role-student {
      background: rgba(56, 189, 248, 0.15);
      color: var(--primary);
    }

    .role-faculty {
      background: rgba(167, 139, 250, 0.15);
      color: var(--accent);
    }

    .role-individual {
      background: rgba(245, 158, 11, 0.15);
      color: var(--warning);
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 0;
      margin-bottom: 2rem;
      border-bottom: 2px solid var(--border);
    }

    .tab {
      padding: 12px 24px;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.3s;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
    }

    .tab:hover {
      color: var(--text);
    }

    .tab.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }

    /* User Detail Modal */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(8px);
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      width: 90%;
      max-width: 800px;
      max-height: 85vh;
      overflow-y: auto;
      padding: 2rem;
      animation: modalIn 0.3s ease;
    }

    @keyframes modalIn {
      from {
        opacity: 0;
        transform: scale(0.95) translateY(20px);
      }

      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }

    .modal-close {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .detail-item {
      background: var(--surface-2);
      padding: 1rem;
      border-radius: 10px;
      border: 1px solid var(--border);
    }

    .detail-item .label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      margin-bottom: 4px;
      font-weight: 600;
    }

    .detail-item .value {
      font-size: 1rem;
      font-weight: 600;
    }

    /* Progress bars */
    .progress-section {
      margin-top: 1.5rem;
    }

    .progress-section h3 {
      margin-bottom: 1rem;
      font-size: 1.1rem;
    }

    .week-progress {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem;
      margin-bottom: 1rem;
    }

    .week-progress .week-title {
      font-weight: 700;
      margin-bottom: 0.75rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .progress-bar-bg {
      height: 8px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 0.5rem;
    }

    .progress-bar-fill {
      height: 100%;
      border-radius: 10px;
      transition: width 0.5s ease;
    }

    .progress-labels {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.5rem;
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    /* No data */
    .no-data {
      text-align: center;
      padding: 4rem;
      color: var(--text-muted);
    }

    .no-data .icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    /* Loading */
    .loading {
      text-align: center;
      padding: 3rem;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--surface-2);
      border-radius: 3px;
    }

    .enrolled-yes {
      color: var(--success);
    }

    .enrolled-no {
      color: var(--text-muted);
    }

    @media (max-width: 768px) {
      .admin-nav {
        padding: 1rem;
      }

      .admin-nav h1 {
        font-size: 1.1rem;
      }

      .admin-container {
        padding: 1rem;
      }

      .stats-grid {
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      }

      .detail-grid {
        grid-template-columns: 1fr;
      }

      .modal {
        width: 95%;
        padding: 1rem;
      }

      .toolbar {
        flex-direction: column;
        align-items: stretch;
      }

      .toolbar input {
        width: 100% !important;
        min-width: 0;
      }
    }
  </style>
</head>

<body>

  <div id="app"></div>

  <script>
    // --- Supabase Config ---
    const SUPABASE_URL = 'https://bwwiwrixnqrtmodhliru.supabase.co';
    // 🔴 SECURITY NOTICE: For this Admin Panel to work securely without login, 
    // you MUST use your 'service_role' key here (Project Settings -> API).
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ3d2l3cml4bnFydG1vZGhsaXJ1Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3MDg4NjA2NSwiZXhwIjoyMDg2NDYyMDY1fQ.vuLHpDJbHkFYR7RU66zj3-S8UtrXIRRnvAJ7_j4PGtk';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const ADMIN_EMAIL = 'ushawin2020@gmail.com';
    const ADMIN_PASS = 'TMusha_29081978';

    let state = {
      loggedIn: false,
      users: [],
      authUsers: [],
      filteredUsers: [],
      activeTab: 'users',
      searchQuery: '',
      roleFilter: 'all',
      selectedUser: null,
      loading: false,
      locations: [],
      locationStats: { states: 0, districts: 0, colleges: 0 },
      searchPost: '',
      searchLoc: '',
      contacts: []
    };

    // --- RENDER ---
    function render() {
      const app = document.getElementById('app');
      if (!state.loggedIn) {
        app.innerHTML = renderLogin();
        return;
      }
      app.innerHTML = renderNav() + renderMain();
    }

    function renderLogin() {
      return `
      <div class="login-container">
        <div class="login-card">
          <div style="font-size:3rem; margin-bottom:1rem">🔐</div>
          <h2>Admin Panel</h2>
          <p>Quantum Computing Study Portal</p>
          <input type="email" id="admin-email" placeholder="Admin Email" value="${typeof ADMIN_EMAIL !== 'undefined' ? ADMIN_EMAIL : ''}">
          <input type="password" id="admin-pass" placeholder="Admin Password">
          <button onclick="adminLogin()">Access Dashboard</button>
          <p style="margin-top:1rem; font-size:0.75rem; color:var(--text-muted)">🔒 This panel is for localhost use only</p>
        </div>
      </div>
    `;
    }

    function renderNav() {
      return `
      <nav class="admin-nav">
        <div style="display:flex; align-items:center; gap:1rem">
          <h1>⚛️ Quantum Admin</h1>
          <span class="badge">LOCALHOST</span>
        </div>
        <div style="display:flex; align-items:center; gap:1rem">
          <span style="font-size:0.85rem; color:var(--text-muted)">👤 Admin</span>
          <button onclick="adminLogout()" style="padding:6px 14px; background:rgba(239,68,68,0.1); color:var(--error); border:1px solid rgba(239,68,68,0.3); border-radius:8px; cursor:pointer; font-size:0.8rem; font-weight:600">Logout</button>
        </div>
      </nav>
    `;
    }

    function renderMain() {
      if (state.loading) {
        return `<div class="admin-container"><div class="loading"><div class="spinner"></div><p>Loading data from Supabase...</p></div></div>`;
      }

      const totalUsers = state.users.length;
      const students = state.users.filter(u => u.role === 'Student').length;
      const faculty = state.users.filter(u => u.role === 'Faculty').length;
      const individuals = state.users.filter(u => u.role === 'Individual').length;
      const enrolled = state.users.filter(u => u.nptel_enrolled).length;
      const examReg = state.users.filter(u => u.nptel_exam).length;

      // Count unique states and colleges
      const uniqueStates = new Set(state.users.map(u => u.state).filter(Boolean)).size;
      const uniqueColleges = new Set(state.users.map(u => u.college).filter(Boolean)).size;

      return `
      <div class="admin-container">
        <!-- Stats -->
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-value" style="color:var(--primary)">${totalUsers}</div>
            <div class="stat-label">Total Users</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" style="color:var(--accent)">${students}</div>
            <div class="stat-label">Students</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" style="color:var(--warning)">${faculty}</div>
            <div class="stat-label">Faculty</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" style="color:var(--success)">${enrolled}</div>
            <div class="stat-label">NPTEL Enrolled</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" style="color:#f472b6">${examReg}</div>
            <div class="stat-label">Exam Registered</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" style="color:#fb923c">${uniqueStates}</div>
            <div class="stat-label">States</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" style="color:#34d399">${uniqueColleges}</div>
            <div class="stat-label">Colleges</div>
          </div>
        </div>

        <!-- Tabs -->
        <div class="tabs">
          <div class="tab ${state.activeTab === 'users' ? 'active' : ''}" onclick="switchTab('users')">👥 All Users</div>
          <div class="tab ${state.activeTab === 'forum' ? 'active' : ''}" onclick="switchTab('forum')">💬 Forum Posts</div>
          <div class="tab ${state.activeTab === 'locations' ? 'active' : ''}" onclick="switchTab('locations')">🏛️ Manage Colleges</div>
          <div class="tab ${state.activeTab === 'states' ? 'active' : ''}" onclick="switchTab('states')">📍 Stats By State</div>
          <div class="tab ${state.activeTab === 'contacts' ? 'active' : ''}" onclick="switchTab('contacts')">📬 Contact Messages</div>
        </div>

        ${state.activeTab === 'users' ? renderUsersTab() : ''}
        ${state.activeTab === 'forum' ? renderForumTab() : ''}
        ${state.activeTab === 'locations' ? renderLocationsTab() : ''}
        ${state.activeTab === 'states' ? renderStatesTab() : ''}
        ${state.activeTab === 'contacts' ? renderContactsTab() : ''}
      </div>

      ${state.selectedUser ? renderUserModal() : ''}
    `;
    }

    function renderUsersTab() {
      const filtered = getFilteredUsers();

      return `
      <!-- Toolbar -->
      <div class="toolbar">
        <input type="text" placeholder="🔍 Search by name, email, college..." value="${state.searchQuery}" oninput="updateSearch(this.value)" style="width:300px">
        <select onchange="updateRoleFilter(this.value)">
          <option value="all" ${state.roleFilter === 'all' ? 'selected' : ''}>All Roles</option>
          <option value="Student" ${state.roleFilter === 'Student' ? 'selected' : ''}>Students</option>
          <option value="Faculty" ${state.roleFilter === 'Faculty' ? 'selected' : ''}>Faculty</option>
          <option value="Individual" ${state.roleFilter === 'Individual' ? 'selected' : ''}>Individuals</option>
        </select>
        <button class="btn-export" onclick="exportCSV()">📥 Export CSV</button>
        <button onclick="loadData()">🔄 Refresh</button>
      </div>

      <p style="font-size:0.85rem; color:var(--text-muted); margin-bottom:1rem">Showing ${filtered.length} of ${state.users.length} users</p>

      <!-- Users Table -->
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th style="width:40px">#</th>
              <th>Name</th>
              <th>Role</th>
              <th>College</th>
              <th style="text-align:center">W1</th>
              <th style="text-align:center">W2</th>
              <th style="text-align:center">W3</th>
              <th style="text-align:center">W4</th>
              <th style="text-align:center">Sim</th>
              <th style="text-align:center">NQ Att</th>
              <th style="text-align:center">Status</th>
            </tr>
          </thead>
          <tbody>
            ${filtered.length === 0 ? `<tr><td colspan="9" style="text-align:center; padding:2rem; color:var(--text-muted)">No users found</td></tr>` : ''}
            ${filtered.map((u, i) => {
        // Helper for week badge
        const renderWeek = (w) => {
          const s = (u.stats && u.stats.weeks) ? u.stats.weeks[w] : { total: 0 };
          const m = (u.stats && u.stats.max && u.stats.max[w]) ? u.stats.max[w] : { l: 0, v: 0, n: 0 };
          const totalMax = (m.l + m.v + m.n) || 100;

          const pct = Math.round((s.total / totalMax) * 100);

          let color = 'var(--text-muted)';
          let bg = 'rgba(255,255,255,0.03)';
          let border = 'transparent';

          if (s.total > 0) {
            if (pct >= 80) { color = 'var(--success)'; bg = 'rgba(34, 197, 94, 0.15)'; border = 'rgba(34, 197, 94, 0.3)'; }
            else if (pct >= 40) { color = 'var(--warning)'; bg = 'rgba(234, 179, 8, 0.15)'; border = 'rgba(234, 179, 8, 0.3)'; }
            else { color = 'var(--error)'; bg = 'rgba(239, 68, 68, 0.15)'; border = 'rgba(239, 68, 68, 0.3)'; }
          }

          return `
                        <td style="text-align:center" title="LNQ:${s.lecture} VLQ:${s.video} NAQ:${s.nptel} NQ:${s.nq} (Total: ${s.total})">
                            <div style="background:${bg}; color:${color}; padding:2px 0; width:40px; border-radius:12px; font-size:0.75rem; font-weight:700; display:inline-block; border:1px solid ${border}; text-align:center">
                                ${s.total > 0 ? pct + '%' : '-'}
                            </div>
                        </td>
                    `;
        };

        return `
              <tr onclick="selectUser('${u.id}')">
                <td style="color:var(--text-muted); font-size:0.8rem">${i + 1}</td>
                <td>
                    <div style="font-weight:600">${u.full_name || '—'}</div>
                    <div style="font-size:0.75rem; color:var(--text-muted)">${u.email || ''}</div>
                </td>
                <td><span class="role-badge role-${(u.role || 'student').toLowerCase()}">${u.role || '—'}</span></td>
                <td style="font-size:0.85rem; max-width:180px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap" title="${u.college || ''}">${u.college || '—'}</td>
                
                ${renderWeek(1)}
                ${renderWeek(2)}
                ${renderWeek(3)}
                ${renderWeek(4)}

    async function loadData() {
      state.loading = true;
      render();

      try {
        // 1. Fetch Profiles
        const { data: profiles, error: pError } = await sb
          .from('profiles')
          .select('*')
          .order('created_at', { ascending: false });

        if (pError) throw pError;

        // 2. Fetch User Progress
        const { data: progressData, error: pgError } = await sb
          .from('user_progress')
          .select('*');

        if (pgError) {
          console.warn("Could not fetch progress:", pgError);
        }

        // 2.5. Fetch Contact Messages safely
        try {
          const { data: contacts, error: contactErr } = await sb.from('contact_messages').select('*').order('created_at', { ascending: false }).limit(200);
          if (!contactErr && contacts) { state.contacts = contacts; }
        } catch (e) { console.warn("Contact messages fetch failed", e); }

        // 3. Merge Data
        state.users = profiles.map(u => {
          const progEntry = progressData ? progressData.find(p => p.user_id === u.id) : null;
          let prog = null;
          if (progEntry && progEntry.progress_data) {
            prog = progEntry.progress_data;
          }

          // Calculate Stats
          let totalScore = 0;
          let weeks = {
            1: { total: 0, lecture: 0, video: 0, nptel: 0, nq: 0, nqAttempts: 0, simulator: 0 },
            2: { total: 0, lecture: 0, video: 0, nptel: 0, nq: 0, nqAttempts: 0, simulator: 0 },
            3: { total: 0, lecture: 0, video: 0, nptel: 0, nq: 0, nqAttempts: 0, simulator: 0 },
            4: { total: 0, lecture: 0, video: 0, nptel: 0, nq: 0, nqAttempts: 0, simulator: 0 }
          };

          const MAX_SCORES = {
            1: { l: 80, v: 80, n: 50, nq: 10 },
            2: { l: 100, v: 40, n: 50, nq: 10 },
            3: { l: 100, v: 40, n: 50, nq: 10 },
            4: { l: 100, v: 70, n: 50, nq: 10 }
          };

          if (prog && prog.scores) {
            Object.entries(prog.scores).forEach(([key, val]) => {
              if (key.startsWith('sim_w')) {
                const w = parseInt(key.split('w')[1]);
                if (weeks[w]) weeks[w].simulator = val;
                return;
              }
              const score = (typeof val === 'number' ? val : 0);
              totalScore += score;
              const parts = key.split('_'); // e.g. "1_1"
              if (parts.length < 2) return;

              const weekNum = parseInt(parts[0]);
              const quizId = parseInt(parts[1]);

              if (weeks[weekNum]) {
                weeks[weekNum].total += score;
                if (quizId <= 10) weeks[weekNum].lecture += score;
                else if (quizId >= 11 && quizId <= 20) weeks[weekNum].video += score;
                else if (quizId >= 21 && quizId <= 30) weeks[weekNum].nptel += score;
                else if (quizId === 31) weeks[weekNum].nq += score;
              }
            });
          }

          // Count NQ Attempts
          if (prog && prog.quizDetails) {
            Object.entries(prog.quizDetails).forEach(([key, details]) => {
              if (key.endsWith('_31_1')) {
                const w = parseInt(key.split('_')[0]);
                if (weeks[w]) weeks[w].nqAttempts = details.totalAttempts || 0;
              }
            });
          }

          return {
            ...u,
            progress: prog,
            stats: { totalScore, weeks, max: MAX_SCORES }
          };
        });

        state.filteredUsers = state.users;

        // Also load forum and locations silently
        loadForumPosts();
        loadLocations();
      } catch (e) {
        console.error('Load error:', e);
        alert('Error loading data: ' + e.message + '\n\nTIP: Did you run the SQL policies to enable public read access?');
      }

      state.loading = false;
      render();
    }

          (u.mobile_number && u.mobile_number.includes(q)) ||
          (u.state && u.state.toLowerCase().includes(q))
        );
      }
      return users;
    }

      render();
    }

    function switchTab(tab) {
      state.activeTab = tab;
      render();
    }

    function selectUser(id) {
      state.selectedUser = state.users.find(u => u.id === id);
      render();
    }

    function closeModal(e) {
      if (e.target.classList.contains('modal-overlay')) {
        state.selectedUser = null;
        render();
      }
    }

    // --- FORUM ACTIONS ---
    async function loadForumPosts() {
      try {
        const { data, error } = await sb.from('forum_posts').select('*').order('created_at', { ascending: false });
        if (error) console.error("Error loading posts:", error);
        else {
          state.posts = data || [];
          render();
        }
      } catch (e) {
        console.error("Forum fetch catch:", e);
      }
    }

    async function deletePost(id) {
      if (!confirm('Are you sure you want to delete this post? This cannot be undone.')) return;
      try {
        const { error } = await sb.from('forum_posts').delete().eq('id', id);
        if (error) alert('Error deleting post: ' + error.message);
        else {
          state.posts = state.posts.filter(p => p.id !== id);
          render();
        }
      } catch (e) {
        alert('Error: ' + e.message);
      }
    }

    // --- LOCATION ACTIONS ---
    async function loadLocations() {
      try {
        const { data, error } = await sb.from('institutions').select('*').order('state', { ascending: true });
        if (error) console.error("Error loading locations:", error);
        else {
          state.locations = data || [];

          // Calculate stats
          const states = new Set(state.locations.map(l => l.state)).size;
          const districts = new Set(state.locations.map(l => l.district).filter(Boolean)).size;
          state.locationStats = { states, districts };

          render();
        }
      } catch (e) {
        console.error("Location fetch catch:", e);
      }
    }

    function showAddLocation() {
      document.getElementById('add-loc-modal').style.display = 'flex';
    }

    function hideAddLocation() {
      document.getElementById('add-loc-modal').style.display = 'none';
      document.getElementById('new-loc-state').value = '';
      document.getElementById('new-loc-dist').value = '';
      document.getElementById('new-loc-name').value = '';
    }
    async function saveLocation() {
      const stateVal = document.getElementById('new-loc-state').value.trim();
      const distVal = document.getElementById('new-loc-dist').value.trim();
      const nameVal = document.getElementById('new-loc-name').value.trim();
      const editingId = document.getElementById('add-loc-modal').dataset.editingId;

      if (!stateVal || !nameVal) {
        alert('Please enter at least State and College Name');
        return;
      }

      try {
        let res;
        if (editingId) {
          res = await sb.from('institutions').update({
            state: stateVal, district: distVal, college_name: nameVal
          }).eq('id', editingId).select();
        } else {
          res = await sb.from('institutions').insert([
            { state: stateVal, district: distVal, college_name: nameVal }
          ]).select();
        }

        if (res.error) alert('Error saving: ' + res.error.message);
        else {
          if (editingId) {
            const idx = state.locations.findIndex(l => l.id == editingId);
            if (idx !== -1) state.locations[idx] = res.data[0];
          } else {
            state.locations.unshift(res.data[0]);
          }
          hideAddLocation();
          render();
        }
      } catch (e) {
        alert('Error: ' + e.message);
      }
    }

    function editLocation(l) {
      showAddLocation();
      document.querySelector('#add-loc-modal h2').innerText = 'Edit Institution';
      document.querySelector('#add-loc-modal').dataset.editingId = l.id;
      document.getElementById('new-loc-state').value = l.state;
      document.getElementById('new-loc-dist').value = l.district || '';
      document.getElementById('new-loc-name').value = l.college_name;
    }

    function hideAddLocation() {
      document.getElementById('add-loc-modal').style.display = 'none';
      document.getElementById('add-loc-modal').dataset.editingId = '';
      document.querySelector('#add-loc-modal h2').innerText = 'Add New Institution';
      document.getElementById('new-loc-state').value = '';
      document.getElementById('new-loc-dist').value = '';
      document.getElementById('new-loc-name').value = '';
    }

    async function deleteLocation(id) {
      if (!confirm('Remove this institution from the database?')) return;
      try {
        const { error } = await sb.from('institutions').delete().eq('id', id);
        if (error) alert('Error deleting: ' + error.message);
        else {
          state.locations = state.locations.filter(l => l.id !== id);
          render();
        }
      } catch (e) {
        alert('Error: ' + e.message);
      }
    }

    function exportCSV() {
      const filtered = getFilteredUsers();
      if (filtered.length === 0) {
        alert('No users to export');
        return;
      }

      const headers = ['Name', 'Email', 'Mobile', 'Role', 'State', 'College', 'NPTEL Enrolled', 'Exam Registered', 'Created At'];
      const rows = filtered.map(u => [
        u.full_name || '',
        u.email || '',
        u.mobile_number || '',
        u.role || '',
        u.state || '',
        u.college || '',
        u.nptel_enrolled ? 'Yes' : 'No',
        u.nptel_exam ? 'Yes' : 'No',
        u.created_at ? new Date(u.created_at).toLocaleString('en-IN') : ''
      ]);

      const csvContent = [
        headers.join(','),
        ...rows.map(row => row.map(cell => `"${cell}"`).join(','))
      ].join('\n');

      const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `quantum_users_${new Date().toISOString().slice(0, 10)}.csv`;
      a.click();
      URL.revokeObjectURL(url);
    }

    // Initial render + auto-load data
    render();
    loadData();
  </script>
</body>

</html>
