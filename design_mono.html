<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design 10: Monochrome Minimalist</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f5f5f7;
            --card-bg: rgba(255, 255, 255, 0.7);
            --text-main: #1d1d1f;
            --text-gray: #86868b;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            padding: 3rem;
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .mono-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 18px;
            padding: 2.5rem;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04);
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .mono-card:hover {
            transform: scale(1.02);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.08);
        }

        h1 {
            font-weight: 900;
            font-size: 3.5rem;
            letter-spacing: -0.03em;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: var(--text-gray);
            font-size: 1.5rem;
            margin-bottom: 3rem;
            font-weight: 300;
        }

        .btn {
            background: #1d1d1f;
            color: white;
            padding: 10px 24px;
            border-radius: 999px;
            border: none;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .stat-large {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Quantum Portal.</h1>
        <div class="subtitle">Simplicity is the ultimate sophistication.</div>

        <div class="grid">
            <div class="mono-card">
                <div class="stat-large">98%</div>
                <div style="color: var(--text-gray);">Focus Efficiency</div>
            </div>
            <div class="mono-card">
                <div class="stat-large">Week 04</div>
                <div style="color: var(--text-gray);">Current Module</div>
            </div>
            <div class="mono-card" style="display: flex; flex-direction: column; justify-content: space-between;">
                <h3 style="margin-top: 0;">Resume Learning</h3>
                <p style="color: var(--text-gray);">Pick up where you left off.</p>
                <button class="btn">Continue</button>
            </div>
        </div>

        <div class="mono-card" style="margin-top: 1.5rem;">
            <h3>Recent Activity</h3>
            <div style="margin-top: 1rem; border-top: 1px solid #d2d2d7; padding-top: 1rem;">
                <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                    <span>Completed Quiz 3</span>
                    <span style="color: var(--text-gray);">2h ago</span>
                </div>
                <div style="display: flex; justify-content: space-between;">
                    <span>Read "Quantum Gates"</span>
                    <span style="color: var(--text-gray);">Yesterday</span>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
