<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design 4: Cyber-Grid Neon</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #000000;
            --grid-color: rgba(0, 255, 65, 0.15);
            --neon-green: #00ff41;
            --neon-glow: 0 0 10px rgba(0, 255, 65, 0.4);
            --card-border: 1px solid var(--neon-green);
        }

        body {
            background-color: var(--bg-color);
            background-image:
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 40px 40px;
            color: var(--neon-green);
            font-family: 'JetBrains Mono', monospace;
            padding: 2rem;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .cyber-card {
            background: rgba(0, 20, 0, 0.8);
            border: var(--card-border);
            padding: 1.5rem;
            position: relative;
            box-shadow: var(--neon-glow);
        }

        .cyber-card::before {
            content: '[SYSTEM_ACTIVE]';
            position: absolute;
            top: -10px;
            right: 10px;
            background: #000;
            padding: 0 5px;
            font-size: 0.7rem;
        }

        h1 {
            text-transform: uppercase;
            font-size: 2.5rem;
            margin-bottom: 2rem;
            border-bottom: 2px dashed var(--neon-green);
            display: inline-block;
        }

        .btn {
            background: var(--neon-green);
            color: #000;
            border: none;
            padding: 0.8rem 1.5rem;
            font-weight: bold;
            font-family: 'JetBrains Mono', monospace;
            cursor: pointer;
            text-transform: uppercase;
        }

        .btn:hover {
            background: #fff;
            box-shadow: 0 0 20px #fff;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>// QUANTUM_TERMINAL_V4</h1>
        <div class="grid">
            <div class="cyber-card">
                <h3>MODULE_01: ENCRYPTION</h3>
                <p>Decoding matrix...</p>
                <div style="font-size: 3rem;">99%</div>
            </div>
            <div class="cyber-card">
                <h3>STATUS_LOG</h3>
                <p>> Initializing qubits...</p>
                <p>> Coherence stable.</p>
                <p>> Ready for input.</p>
                <button class="btn" style="margin-top: 1rem;">EXECUTE</button>
            </div>
            <div class="cyber-card">
                <h3>NEXT_TARGET</h3>
                <div style="font-size: 1.5rem; margin: 1rem 0;">GROVER_SEARCH</div>
                <div style="height: 10px; background: #003300; width: 100%;">
                    <div style="height: 100%; width: 45%; background: var(--neon-green);"></div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
